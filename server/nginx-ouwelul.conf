# Theo75 / ouwelul — nginx snippet
# Plaats binnen het bestaande server-block(s) van horsecloud55.ddns.net.
# Bestaande location-blocks intact laten (P-TECH-04 SHARED_INFRASTRUCTURE).

location /ouwelul/api/ {
    proxy_pass http://127.0.0.1:3989/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /ouwelul/ {
    alias /opt/ouwelul/;
    index index.html;
    try_files $uri $uri/ /ouwelul/index.html;
}
